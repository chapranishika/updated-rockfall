services:
  # ── 1. FastAPI Web Service (Native Python) ──────────────────────────────────
  - type: web
    name: rockfall-backend
    env: python
    buildCommand: "pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PORT
        value: "8000"
      - key: MONGO_HOST
        value: "localhost"
      - key: MONGO_PORT
        value: "27017"
      - key: MONGO_DB
        value: "rockfall_geosafety"
      - key: MONGO_USER
        value: ""
      - key: MONGO_PASSWORD
        value: ""

  # ── 2. Next.js Frontend Web Service (Native Node.js) ────────────────────────
  - type: web
    name: rockfall-frontend
    env: node
    rootDir: ui
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    startCommand: "npm start"
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://rockfall-backend.onrender.com"
