services:
  # ── 1. FastAPI Web Service ──────────────────────────────────────────────────
  - type: web
    name: rockfall-backend
    env: docker
    dockerfilePath: Dockerfile.backend
    dockerContext: .
    envVars:
      - key: PORT
        value: "8000"
      - key: MONGO_HOST
        value: "localhost"
      - key: MONGO_PORT
        value: "27017"
      - key: MONGO_DB
        value: "rockfall_geosafety"
      - key: MONGO_USER
        value: ""
      - key: MONGO_PASSWORD
        value: ""

  # ── 2. Next.js Frontend Web Service ─────────────────────────────────────────
  - type: web
    name: rockfall-frontend
    env: docker
    dockerfilePath: Dockerfile.ui
    dockerContext: .
    envVars:
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://rockfall-backend.onrender.com"
